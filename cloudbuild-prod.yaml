# =============================================================================
# Cloud Build — PROD Pipeline (main branch → hushh-tech-prod project)
#
# Trigger: Push to `main` branch → Build → Deploy to Cloud Run (PROD)
# Project: hushh-tech-prod
# =============================================================================

steps:
  # Step 1: Build Docker image with VITE_* build args
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.gcp'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'VITE_SUPABASE_REDIRECT_URL=${_VITE_SUPABASE_REDIRECT_URL}'
      - '--build-arg'
      - 'VITE_KYC_ENV=${_VITE_KYC_ENV}'
      - '--build-arg'
      - 'VITE_KYC_DEMO_MODE=${_VITE_KYC_DEMO_MODE}'
      - '--build-arg'
      - 'VITE_KYC_API_BASE=${_VITE_KYC_API_BASE}'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '.'

  # Step 2: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest']

  # Step 3: Deploy to Cloud Run (PROD)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '250'
      - '--timeout'
      - '60s'
      - '--set-env-vars'
      - 'NODE_ENV=production,COMMUNITY_CONTENT_BACKEND=gcp,COMMUNITY_CONTENT_COLLECTION=${_COMMUNITY_CONTENT_COLLECTION},COMMUNITY_CONTENT_BUCKET=${_COMMUNITY_CONTENT_BUCKET},COMMUNITY_CONTENT_CACHE_SECONDS=${_COMMUNITY_CONTENT_CACHE_SECONDS},LEGACY_SUPABASE_URL=${_LEGACY_SUPABASE_URL},METRICS_REPORT_RECIPIENTS=${_METRICS_REPORT_RECIPIENTS},METRICS_REPORT_TIMEZONE=${_METRICS_REPORT_TIMEZONE},METRICS_REPORT_SCHEDULE=${_METRICS_REPORT_SCHEDULE},METRICS_REPORT_FROM_EMAIL=${_METRICS_REPORT_FROM_EMAIL}'
      - '--set-secrets'
      - 'SUPABASE_URL=${_SUPABASE_URL_SECRET}:latest,SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY_SECRET}:latest,LOOKER_STUDIO_EMBED_URL=${_LOOKER_STUDIO_EMBED_URL_SECRET}:latest,GA4_PROPERTY_ID=${_GA4_PROPERTY_ID_SECRET}:latest,GA4_ALLOWED_HOSTNAMES=${_GA4_ALLOWED_HOSTNAMES_SECRET}:latest,GCP_MONITORING_PROJECT_ID=${_GCP_MONITORING_PROJECT_ID_SECRET}:latest,GCP_CLOUD_RUN_REGION=${_GCP_CLOUD_RUN_REGION_SECRET}:latest,GCP_CLOUD_RUN_SERVICES=${_GCP_CLOUD_RUN_SERVICES_SECRET}:latest,SEARCH_CONSOLE_SITE_URL=${_SEARCH_CONSOLE_SITE_URL_SECRET}:latest,SEARCH_CONSOLE_TYPE=${_SEARCH_CONSOLE_TYPE_SECRET}:latest,SEARCH_CONSOLE_DATA_STATE=${_SEARCH_CONSOLE_DATA_STATE_SECRET}:latest,SEARCH_CONSOLE_ROW_LIMIT=${_SEARCH_CONSOLE_ROW_LIMIT_SECRET}:latest,ANALYTICS_HASH_SALT=${_ANALYTICS_HASH_SALT_SECRET}:latest'

substitutions:
  _SERVICE_NAME: hushh-tech-website
  _REGION: us-central1
  _VITE_KYC_ENV: production
  _VITE_KYC_DEMO_MODE: 'false'
  _COMMUNITY_CONTENT_COLLECTION: community_posts
  _COMMUNITY_CONTENT_BUCKET: hushh-tech-community-content-prod
  _COMMUNITY_CONTENT_CACHE_SECONDS: '300'
  _LEGACY_SUPABASE_URL: ''
  _METRICS_REPORT_RECIPIENTS: ankit@hushh.ai
  _METRICS_REPORT_TIMEZONE: America/Los_Angeles
  _METRICS_REPORT_SCHEDULE: 0 8 * * *
  _METRICS_REPORT_FROM_EMAIL: ''
  _SUPABASE_URL_SECRET: hushh-tech-supabase-url
  _SUPABASE_SERVICE_ROLE_KEY_SECRET: hushh-tech-supabase-service-role-key
  _LOOKER_STUDIO_EMBED_URL_SECRET: hushh-tech-metrics-looker-studio-embed-url
  _GA4_PROPERTY_ID_SECRET: hushh-tech-metrics-ga4-property-id
  _GA4_ALLOWED_HOSTNAMES_SECRET: hushh-tech-metrics-ga4-allowed-hostnames
  _GCP_MONITORING_PROJECT_ID_SECRET: hushh-tech-metrics-gcp-monitoring-project-id
  _GCP_CLOUD_RUN_REGION_SECRET: hushh-tech-metrics-gcp-cloud-run-region
  _GCP_CLOUD_RUN_SERVICES_SECRET: hushh-tech-metrics-gcp-cloud-run-services
  _SEARCH_CONSOLE_SITE_URL_SECRET: hushh-tech-metrics-search-console-site-url
  _SEARCH_CONSOLE_TYPE_SECRET: hushh-tech-metrics-search-console-type
  _SEARCH_CONSOLE_DATA_STATE_SECRET: hushh-tech-metrics-search-console-data-state
  _SEARCH_CONSOLE_ROW_LIMIT_SECRET: hushh-tech-metrics-search-console-row-limit
  _ANALYTICS_HASH_SALT_SECRET: hushh-tech-analytics-hash-salt

timeout: '1200s'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
